name: Deploy Attendance Tracking UI

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    name: Build and Deploy Attendance FE
    runs-on: self-hosted

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Cleanup Old Environment
        shell: cmd
        run: |
          echo "[INFO] Dang dung va xoa Container Attendance FE cu..."
          docker rm -f attendance-fe-running || echo "[INFO] Khong co container cu."

          echo "[INFO] Dang xoa Image Attendance FE cu..."
          docker rmi -f attendance-fe || echo "[INFO] Khong co image cu."

      - name: 3. Build Docker Image (No Cache)
        shell: cmd
        run: |
          echo "[INFO] Bat dau build React app Attendance..."
          docker build --no-cache -t attendance-fe .

      - name: 4. Run New Container
        shell: cmd
        run: |
          echo "[INFO] Khoi dong giao dien Attendance FE..."
          
          REM ==========================================================
          REM -v C:\dockercert... : Dung chung chung chi SSL Tailscale
          REM -p 6000:80 : Cong HTTP tran cho Attendance (http://...)
          REM -p 6001:443 : Cong HTTPS an toan cho Attendance (https://...:6001)
          REM ==========================================================
          
          docker run -d --restart unless-stopped ^
            --name attendance-fe-running ^
            -v "C:\dockercert:/https:ro" ^
            -p 6000:80 ^
            -p 6001:443 ^
            attendance-fe

      - name: 5. System Cleanup
        shell: cmd
        run: |
          echo "[INFO] Don dep rac Docker..."
          docker image prune -f