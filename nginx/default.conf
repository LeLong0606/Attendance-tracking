server {
    listen 80;
    listen 443 ssl;

    server_name desktop-8l98oc0.tail542363.ts.net;

    ssl_certificate     /https/desktop-8l98oc0.tail542363.ts.net.crt;
    ssl_certificate_key /https/desktop-8l98oc0.tail542363.ts.net.key;

    # =========================
    # FRONTEND SPA
    # =========================
    location = /workdaymanagement/ui {
        return 301 /workdaymanagement/ui/;
    }

    location /workdaymanagement/ui/ {
        root  /usr/share/nginx/html;
        index index.html;
        # Strip prefix trước khi lookup file trong dist/
        rewrite ^/workdaymanagement/ui/?(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    # =========================
    # BACKEND API PROXY
    # Forward đúng proto để Kestrel không 307 về 8081
    # =========================
    location /workdaymanagement/ {
        proxy_pass         http://host.docker.internal:8081/workdaymanagement/;
        proxy_http_version 1.1;
        proxy_redirect     off;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  https;
        proxy_set_header X-Forwarded-Host   $host;
        proxy_set_header X-Forwarded-Port   443;
    }
}
