server {
    listen 80;
    listen 443 ssl;

    ssl_certificate /https/desktop-8l98oc0.tail542363.ts.net.crt;
    ssl_certificate_key /https/desktop-8l98oc0.tail542363.ts.net.key;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Never rewrite static assets to index.html, return 404 if missing.
    location /assets/ {
        try_files $uri =404;
    }

    # Keep index.html fresh to avoid stale hashed asset references.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA fallback for application routes only.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
